<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TILT BALL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #050810;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  font-family: 'Orbitron', monospace;
}
canvas {
  display: block;
  width: 100%; height: 100%;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // --- Constants ---
  const FRICTION = 0.985;
  const BOUNCE_LOSS = 0.6;
  const BALL_RADIUS = 14;
  const STAR_RADIUS = 16;
  const STAR_COUNT = 4;
  const GAME_TIME = 45;
  const COMBO_DECAY = 1.5; // seconds before combo resets
  const TILT_SENSITIVITY = 0.4;
  const TRAIL_LENGTH = 12;

  // --- State ---
  let W, H, dpr;
  let state = 'permission'; // permission | start | playing | gameover
  let score = 0;
  let combo = 1;
  let lastCollectTime = 0;
  let timeLeft = GAME_TIME;
  let bestScore = parseInt(localStorage.getItem('tiltball_best') || '0');
  let hasGyro = false;
  let gyroPermGranted = false;
  let tiltX = 0, tiltY = 0;
  let mouseActive = false;
  let lastMouseX = 0, lastMouseY = 0;
  let gameStartTime = 0;
  let lastFrameTime = 0;

  // Ball
  const ball = { x: 0, y: 0, vx: 0, vy: 0 };
  const trail = [];

  // Stars
  let stars = [];

  // Effects
  let effects = [];

  // --- Resize ---
  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // --- Gyroscope ---
  function handleOrientation(e) {
    if (state !== 'playing') return;
    let gamma = e.gamma || 0; // left-right tilt (-90 to 90)
    let beta = e.beta || 0;   // front-back tilt (-180 to 180)
    // Clamp
    gamma = Math.max(-45, Math.min(45, gamma));
    beta = Math.max(-45, Math.min(45, beta));
    tiltX = gamma / 45;
    tiltY = beta / 45;
  }

  function requestGyroPermission() {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      // iOS 13+
      DeviceOrientationEvent.requestPermission().then(response => {
        if (response === 'granted') {
          gyroPermGranted = true;
          hasGyro = true;
          window.addEventListener('deviceorientation', handleOrientation);
        }
        state = 'start';
      }).catch(() => {
        state = 'start';
      });
    } else {
      // Android / desktop
      window.addEventListener('deviceorientation', (e) => {
        if (e.gamma !== null) hasGyro = true;
        handleOrientation(e);
      });
      gyroPermGranted = true;
      state = 'start';
    }
  }

  // --- Mouse fallback ---
  canvas.addEventListener('mousemove', (e) => {
    if (state !== 'playing' || hasGyro) return;
    mouseActive = true;
    const cx = W / 2, cy = H / 2;
    tiltX = (e.clientX - cx) / cx;
    tiltY = (e.clientY - cy) / cy;
  });

  // Touch to start / permission
  canvas.addEventListener('click', () => {
    if (state === 'permission') {
      requestGyroPermission();
    } else if (state === 'start' || state === 'gameover') {
      startGame();
    }
  });

  // --- Star spawn ---
  function spawnStar() {
    const pad = 40;
    let x, y, valid;
    // Avoid spawning on ball or other stars
    for (let attempt = 0; attempt < 50; attempt++) {
      x = pad + Math.random() * (W - pad * 2);
      y = pad + Math.random() * (H - pad * 2);
      valid = true;
      const dx = x - ball.x, dy = y - ball.y;
      if (Math.sqrt(dx * dx + dy * dy) < 60) { valid = false; continue; }
      for (const s of stars) {
        const sdx = x - s.x, sdy = y - s.y;
        if (Math.sqrt(sdx * sdx + sdy * sdy) < 50) { valid = false; break; }
      }
      if (valid) break;
    }
    stars.push({ x, y, spawnTime: performance.now(), phase: Math.random() * Math.PI * 2 });
  }

  // --- Game start ---
  function startGame() {
    state = 'playing';
    score = 0;
    combo = 1;
    lastCollectTime = 0;
    timeLeft = GAME_TIME;
    ball.x = W / 2;
    ball.y = H / 2;
    ball.vx = 0;
    ball.vy = 0;
    trail.length = 0;
    stars = [];
    effects = [];
    tiltX = 0;
    tiltY = 0;
    for (let i = 0; i < STAR_COUNT; i++) spawnStar();
    gameStartTime = performance.now();
    lastFrameTime = gameStartTime;
  }

  // --- Effects ---
  function addCollectEffect(x, y, points) {
    // Pulse ring
    effects.push({ type: 'ring', x, y, t: 0, maxT: 0.5 });
    // Score popup
    effects.push({ type: 'score', x, y: y - 10, t: 0, maxT: 0.8, text: '+' + points });
  }

  function addComboPopup(combo) {
    effects.push({ type: 'combo', x: W / 2, y: H / 2 - 30, t: 0, maxT: 1.0, text: 'x' + combo });
  }

  // --- Update ---
  function update(dt) {
    if (state !== 'playing') return;

    // Timer
    timeLeft -= dt;
    if (timeLeft <= 0) {
      timeLeft = 0;
      state = 'gameover';
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('tiltball_best', bestScore.toString());
      }
      return;
    }

    // Combo decay
    const now = performance.now() / 1000;
    if (combo > 1 && now - lastCollectTime > COMBO_DECAY) {
      combo = 1;
    }

    // Ball physics
    const accelScale = 800;
    ball.vx += tiltX * TILT_SENSITIVITY * accelScale * dt;
    ball.vy += tiltY * TILT_SENSITIVITY * accelScale * dt;
    ball.vx *= Math.pow(FRICTION, dt * 60);
    ball.vy *= Math.pow(FRICTION, dt * 60);
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    // Wall bounce
    if (ball.x - BALL_RADIUS < 0) {
      ball.x = BALL_RADIUS;
      ball.vx = Math.abs(ball.vx) * BOUNCE_LOSS;
    }
    if (ball.x + BALL_RADIUS > W) {
      ball.x = W - BALL_RADIUS;
      ball.vx = -Math.abs(ball.vx) * BOUNCE_LOSS;
    }
    if (ball.y - BALL_RADIUS < 0) {
      ball.y = BALL_RADIUS;
      ball.vy = Math.abs(ball.vy) * BOUNCE_LOSS;
    }
    if (ball.y + BALL_RADIUS > H) {
      ball.y = H - BALL_RADIUS;
      ball.vy = -Math.abs(ball.vy) * BOUNCE_LOSS;
    }

    // Trail
    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    if (speed > 10) {
      trail.push({ x: ball.x, y: ball.y, age: 0 });
      if (trail.length > TRAIL_LENGTH) trail.shift();
    }
    for (const t of trail) t.age += dt;
    while (trail.length > 0 && trail[0].age > 0.3) trail.shift();

    // Star collision
    for (let i = stars.length - 1; i >= 0; i--) {
      const s = stars[i];
      const dx = ball.x - s.x, dy = ball.y - s.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < BALL_RADIUS + STAR_RADIUS) {
        // Collect!
        const now2 = performance.now() / 1000;
        if (now2 - lastCollectTime < COMBO_DECAY) {
          combo = Math.min(8, combo * 2);
        } else {
          combo = 1;
        }
        lastCollectTime = now2;
        const points = 10 * combo;
        score += points;
        addCollectEffect(s.x, s.y, points);
        if (combo >= 3) addComboPopup(combo);
        stars.splice(i, 1);
        spawnStar();
      }
    }

    // Update effects
    for (let i = effects.length - 1; i >= 0; i--) {
      effects[i].t += dt;
      if (effects[i].t >= effects[i].maxT) effects.splice(i, 1);
    }
  }

  // --- Draw helpers ---
  function drawGrid() {
    ctx.strokeStyle = 'rgba(50, 70, 120, 0.12)';
    ctx.lineWidth = 1;
    const step = 40;
    for (let x = 0; x < W; x += step) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += step) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  function drawStar5(cx, cy, r, innerR) {
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const angle = (Math.PI / 2 * 3) + (i * Math.PI / 5);
      const rad = i % 2 === 0 ? r : innerR;
      const x = cx + Math.cos(angle) * rad;
      const y = cy + Math.sin(angle) * rad;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
  }

  function drawBall() {
    // Trail
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const alpha = (1 - t.age / 0.3) * 0.4 * (i / trail.length);
      const r = BALL_RADIUS * (0.3 + 0.5 * (i / trail.length));
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(80, 220, 120, ${alpha})`;
      ctx.fill();
    }

    // Ball shadow
    ctx.beginPath();
    ctx.arc(ball.x + 2, ball.y + 2, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fill();

    // Ball body
    const grad = ctx.createRadialGradient(
      ball.x - BALL_RADIUS * 0.3, ball.y - BALL_RADIUS * 0.3, BALL_RADIUS * 0.1,
      ball.x, ball.y, BALL_RADIUS
    );
    grad.addColorStop(0, '#fffef0');
    grad.addColorStop(0.6, '#e8e4d0');
    grad.addColorStop(1, '#b0a890');
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Shine highlight
    ctx.beginPath();
    ctx.arc(ball.x - BALL_RADIUS * 0.3, ball.y - BALL_RADIUS * 0.3, BALL_RADIUS * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fill();
  }

  function drawStars(now) {
    for (const s of stars) {
      const elapsed = (now - s.spawnTime) / 1000;
      const pulse = 1 + 0.1 * Math.sin(elapsed * 3 + s.phase);
      const r = STAR_RADIUS * pulse;

      // Glow
      ctx.save();
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 18 + 6 * Math.sin(elapsed * 4 + s.phase);

      // Star shape
      drawStar5(s.x, s.y, r, r * 0.45);
      const sg = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r);
      sg.addColorStop(0, '#fff8b0');
      sg.addColorStop(0.5, '#ffd700');
      sg.addColorStop(1, '#c8a200');
      ctx.fillStyle = sg;
      ctx.fill();

      ctx.restore();
    }
  }

  function drawHUD() {
    // Score - top left
    ctx.font = '700 22px Orbitron';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(score, 16, 16);

    // Combo - top right
    if (combo > 1) {
      ctx.font = '900 24px Orbitron';
      ctx.textAlign = 'right';
      const comboColors = { 2: '#4fc3f7', 4: '#ab47bc', 8: '#ff5722' };
      ctx.fillStyle = comboColors[combo] || '#ffd700';
      ctx.fillText('x' + combo, W - 16, 16);
    }

    // Timer bar - bottom
    const barH = 6;
    const barY = H - barH - 8;
    const barW = W - 32;
    const pct = Math.max(0, timeLeft / GAME_TIME);

    // Background
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.roundRect(16, barY, barW, barH, 3);
    ctx.fill();

    // Fill
    let barColor;
    if (pct > 0.5) barColor = '#4fc3f7';
    else if (pct > 0.2) barColor = '#ffd700';
    else barColor = '#ff5722';
    ctx.fillStyle = barColor;
    ctx.beginPath();
    ctx.roundRect(16, barY, barW * pct, barH, 3);
    ctx.fill();
  }

  function drawEffects() {
    for (const e of effects) {
      const p = e.t / e.maxT;
      if (e.type === 'ring') {
        ctx.beginPath();
        ctx.arc(e.x, e.y, 10 + 40 * p, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 215, 0, ${1 - p})`;
        ctx.lineWidth = 3 * (1 - p);
        ctx.stroke();
      } else if (e.type === 'score') {
        ctx.font = '700 ' + (16 + 8 * Math.min(1, p * 4)) + 'px Orbitron';
        ctx.fillStyle = `rgba(255, 255, 255, ${1 - p})`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(e.text, e.x, e.y - 30 * p);
      } else if (e.type === 'combo') {
        const scale = p < 0.2 ? p / 0.2 : 1;
        const alpha = p < 0.6 ? 1 : 1 - (p - 0.6) / 0.4;
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.scale(scale * 1.5, scale * 1.5);
        ctx.font = '900 48px Orbitron';
        ctx.fillStyle = `rgba(255, 215, 0, ${alpha})`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 20;
        ctx.fillText(e.text, 0, 0);
        ctx.restore();
      }
    }
  }

  function drawScreen(title, subtitle, extra) {
    ctx.fillStyle = '#050810';
    ctx.fillRect(0, 0, W, H);
    drawGrid();

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.font = '900 36px Orbitron';
    ctx.fillStyle = '#fff';
    ctx.fillText(title, W / 2, H / 2 - 50);

    if (subtitle) {
      ctx.font = '400 16px Orbitron';
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fillText(subtitle, W / 2, H / 2 + 10);
    }

    if (extra) {
      ctx.font = '400 14px Orbitron';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      extra.forEach((line, i) => {
        ctx.fillText(line, W / 2, H / 2 + 50 + i * 24);
      });
    }

    // Pulsing "tap" prompt
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 400);
    ctx.font = '400 14px Orbitron';
    ctx.fillStyle = `rgba(79, 195, 247, ${0.4 + 0.4 * pulse})`;
    ctx.fillText('TAP TO ' + (state === 'permission' ? 'CONTINUE' : 'START'), W / 2, H - 60);
  }

  // --- Main loop ---
  function frame(timestamp) {
    requestAnimationFrame(frame);

    const dt = Math.min(0.05, (timestamp - lastFrameTime) / 1000);
    lastFrameTime = timestamp;

    if (state === 'permission') {
      drawScreen('TILT BALL', 'Roll the ball. Collect the stars.', ['Gyroscope access needed for mobile']);
      return;
    }

    if (state === 'start') {
      const inputHint = hasGyro ? 'Tilt your phone to move' : 'Move mouse to tilt';
      drawScreen('TILT BALL', inputHint, ['Collect stars before time runs out!']);
      return;
    }

    if (state === 'gameover') {
      const lines = ['SCORE: ' + score];
      if (score >= bestScore && score > 0) lines.push('NEW BEST!');
      else lines.push('BEST: ' + bestScore);
      drawScreen('TIME UP', null, lines);
      return;
    }

    // Playing
    update(dt);

    // Draw
    ctx.fillStyle = '#050810';
    ctx.fillRect(0, 0, W, H);
    drawGrid();
    drawStars(performance.now());
    drawBall();
    drawEffects();
    drawHUD();
  }

  lastFrameTime = performance.now();
  requestAnimationFrame(frame);

  // Check if we even need permission screen
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    state = 'permission';
  } else {
    // Auto-setup for non-iOS
    window.addEventListener('deviceorientation', (e) => {
      if (e.gamma !== null) hasGyro = true;
      handleOrientation(e);
    });
    state = 'start';
  }
})();
</script>
</body>
</html>
