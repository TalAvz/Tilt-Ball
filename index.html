<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06D6A0">
<meta name="screen-orientation" content="landscape">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<title>TILT BALL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #050810;
}
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #050810;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  font-family: 'Orbitron', monospace;
  position: fixed;
  top: 0;
  left: 0;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
  position: fixed;
  top: 0;
  left: 0;
}
@media (orientation: portrait) {
  body {
    width: 100vh;
    height: 100vw;
    transform-origin: top left;
    transform: rotate(90deg) translateY(-100%);
    overflow: hidden;
    position: fixed;
  }
}
@media (orientation: landscape) {
  body {
    width: 100vw;
    height: 100vh;
    transform: none;
    position: fixed;
  }
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // Preload jungle background image
  const jungleBg = new Image();
  jungleBg.src = 'jungle-bg.png';

  // ========== CONSTANTS ==========
  const BALL_RADIUS = 14;
  const STAR_RADIUS = 16;
  const COMBO_DECAY = 2.0;
  const TILT_SENSITIVITY = 0.52;
  const TRAIL_LENGTH = 12;
  const BOUNCE_LOSS = 0.6;
  const TRAP_RADIUS = 18;
  const TRAP_PENALTY = 3;
  const TRAP_INVULN = 1.0;
  const STAR_LIFETIME = 8;
  const STAR_FLASH_START = 5.5;

  // ========== WORLD DEFINITIONS ==========
  const WORLDS = [
    {
      name: 'Jungle', icon: '\u{1F33F}',
      bg: '#0d2b0d', gridColor: 'rgba(30,80,30,0.10)',
      palette: ['#0d2b0d','#1a4a1a','#2d6b2d','#4a8c4a'],
      ballColors: ['#8B5E3C','#6B3F1F','#5A3015'],
      trailColor: [100, 70, 40],
      starColors: ['#FFD700','#FF8C00','#32CD32'],
      starShape: 'fruit',
      trapShape: 'jungleCreature',
      trapColor: '#2d8b2d',
      particleType: 'fallingLeaf',
      particleColor: [80, 160, 40],
      friction: 0.990,
      accelMult: 1.3,
      musicBase: 220, musicScale: [0,2,4,5,7,9,11],
      collectibleName: 'Fruit'
    },
    {
      name: 'Desert', icon: '\u{1F3DC}\uFE0F',
      bg: '#1a1408', gridColor: 'rgba(120,90,40,0.12)',
      palette: ['#c2956b','#e0b87a','#f5d89a','#8b6914'],
      ballColors: ['#c2956b','#e0b87a','#8b6914'],
      trailColor: [200, 170, 100],
      starColors: ['#e74c3c','#c0392b','#ff6b6b'],
      starShape: 'gem',
      trapShape: 'cactus',
      trapColor: '#2d8b2d',
      particleType: 'dust',
      particleColor: [200, 180, 130],
      friction: 0.982,
      accelMult: 1.105,
      musicBase: 196, musicScale: [0,2,3,5,7,8,10],
      collectibleName: 'Gem'
    },
    {
      name: 'Sea', icon: '\u{1F30A}',
      bg: '#060d1a', gridColor: 'rgba(30,80,160,0.12)',
      palette: ['#1a5276','#2980b9','#5dade2','#85c1e9'],
      ballColors: ['#5dade2','#85c1e9','#aed6f1'],
      trailColor: [100, 180, 240],
      starColors: ['#f5cba7','#fad7a0','#f0e0c0'],
      starShape: 'shell',
      trapShape: 'jellyfish',
      trapColor: '#e080e0',
      particleType: 'bubble',
      particleColor: [130, 200, 255],
      friction: 0.994,
      accelMult: 0.91,
      musicBase: 262, musicScale: [0,2,4,7,9,12,14],
      collectibleName: 'Shell'
    },
    {
      name: 'Urban', icon: '\u{1F3D9}\uFE0F',
      bg: '#0d0d12', gridColor: 'rgba(100,100,120,0.15)',
      palette: ['#666','#999','#ccc','#ff6600'],
      ballColors: ['#e67e22','#d35400','#c0392b'],
      trailColor: [230, 130, 30],
      starColors: ['#f1c40f','#f39c12','#e67e22'],
      starShape: 'coin',
      trapShape: 'car',
      trapColor: '#cc3333',
      particleType: 'rain',
      particleColor: [150, 170, 200],
      friction: 0.985,
      accelMult: 1.69,
      musicBase: 330, musicScale: [0,3,5,6,7,10,12],
      collectibleName: 'Coin'
    },
    {
      name: 'Space', icon: '\u{1F680}',
      bg: '#020208', gridColor: 'rgba(60,60,100,0.08)',
      palette: ['#4a0080','#7b00cc','#a855f7','#d8b4fe'],
      ballColors: ['#c0c0c0','#e0e0e0','#ffffff'],
      trailColor: [180, 130, 255],
      starColors: ['#ffd700','#fff8b0','#ffe066'],
      starShape: 'star',
      trapShape: 'asteroid',
      trapColor: '#8b7355',
      particleType: 'stardrift',
      particleColor: [200, 200, 255],
      friction: 0.996,
      accelMult: 1.17,
      musicBase: 147, musicScale: [0,2,4,5,7,9,11],
      collectibleName: 'Star'
    }
  ];

  // ========== LEVEL CONFIG ==========
  function getLevelConfig(level) {
    // level 0-9 with tiered difficulty scaling
    if (level < 2) return { starCount: 3, trapCount: 0, slippery: false, movingStars: false, bossMode: false, trapSpeed: 0, passScore: 100, gameTime: 30 };
    if (level < 4) return { starCount: 3, trapCount: 1, slippery: false, movingStars: false, bossMode: false, trapSpeed: 60, passScore: 130, gameTime: 35 };
    if (level < 6) return { starCount: 4, trapCount: 2, slippery: false, movingStars: false, bossMode: false, trapSpeed: 80, passScore: 160, gameTime: 38 };
    if (level < 8) return { starCount: 4, trapCount: 3, slippery: true, movingStars: false, bossMode: false, trapSpeed: 120, passScore: 200, gameTime: 40 };
    if (level < 9) return { starCount: 5, trapCount: 3, slippery: true, movingStars: true, bossMode: false, trapSpeed: 150, passScore: 250, gameTime: 40 };
    return { starCount: 5, trapCount: 4, slippery: true, movingStars: true, bossMode: true, trapSpeed: 170, passScore: 300, gameTime: 35 };
  }

  // ========== PROGRESS ==========
  function loadProgress() {
    try {
      const d = JSON.parse(localStorage.getItem('tiltball_progress') || '{}');
      return {
        worldsUnlocked: d.worldsUnlocked || 1,
        levels: d.levels || {},
        bestScores: d.bestScores || {}
      };
    } catch { return { worldsUnlocked: 1, levels: {}, bestScores: {} }; }
  }
  function saveProgress() { localStorage.setItem('tiltball_progress', JSON.stringify(progress)); }
  function getLevelKey(w, l) { return w + '_' + l; }
  function getLevelStars(w, l) { return progress.levels[getLevelKey(w, l)] || 0; }
  function isLevelUnlocked(w, l) {
    if (w >= progress.worldsUnlocked) return false;
    if (l === 0) return true;
    return getLevelStars(w, l - 1) > 0;
  }
  function scoreToStars(s, passScore) {
    const ps = passScore || 200;
    if (s >= ps * 2) return 3;
    if (s >= ps * 1.5) return 2;
    if (s >= ps) return 1;
    return 0;
  }

  let progress = loadProgress();

  // ========== STATE ==========
  let W, H, dpr;
  // states: permission, title, worldSelect, levelSelect, playing, levelComplete, gameover
  let state = 'permission';
  let score = 0;
  let combo = 1;
  let lastCollectTime = 0;
  let timeLeft = 45;
  let hasGyro = false;
  let gyroPermGranted = false;
  let tiltX = 0, tiltY = 0;
  let mouseActive = false;
  let gameStartTime = 0;
  let lastFrameTime = 0;
  let currentWorld = 0;
  let currentLevel = 0;
  let earnedStars = 0;
  let trapInvulnTimer = 0;
  let screenShake = 0;
  let screenRedFlash = 0;
  let speedBoostSpawnTimer = 0;
  let levelPassScore = 200;
  let levelGameTime = 45;

  // Ball
  const ball = { x: 0, y: 0, vx: 0, vy: 0 };
  const trail = [];

  // Stars, traps, effects, particles
  let stars = [];
  let traps = [];
  let effects = [];
  let ambientParticles = [];

  // Speed boosts (jungle vine powerup)
  let speedBoosts = [];
  let speedBoostTimer = 0;
  const SPEED_BOOST_DURATION = 4;
  const SPEED_BOOST_MULT = 2.0;
  const SPEED_BOOST_RADIUS = 18;

  // UI scroll
  let scrollY = 0;
  let targetScrollY = 0;

  // ========== AUDIO (Web Audio API procedural) ==========
  let audioCtx = null;
  let masterGain = null;
  let bgOscillators = [];
  let bgInterval = null;

  function initAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.12;
      masterGain.connect(audioCtx.destination);
    } catch {}
  }

  function playCollectSound(worldIdx) {
    if (!audioCtx) return;
    const w = WORLDS[worldIdx];
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    const note = w.musicBase * Math.pow(2, w.musicScale[Math.floor(Math.random() * w.musicScale.length)] / 12);
    osc.frequency.setValueAtTime(note, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(note * 1.5, audioCtx.currentTime + 0.1);
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.connect(g);
    g.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
  }

  function playTrapSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
    g.gain.setValueAtTime(0.25, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.connect(g);
    g.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
  }

  function startBgMusic(worldIdx) {
    stopBgMusic();
    if (!audioCtx) return;
    const w = WORLDS[worldIdx];
    let noteIdx = 0;
    bgInterval = setInterval(() => {
      if (state !== 'playing') return;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = worldIdx === 2 ? 'sine' : worldIdx === 3 ? 'square' : 'triangle';
      const scaleNote = w.musicScale[noteIdx % w.musicScale.length];
      const octave = Math.floor(noteIdx / w.musicScale.length);
      const freq = w.musicBase * Math.pow(2, (scaleNote + octave * 12) / 12) * 0.5;
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0.06, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
      osc.connect(g);
      g.connect(masterGain);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.8);
      noteIdx = (noteIdx + 1) % (w.musicScale.length * 2);
    }, 600 + worldIdx * 100);
  }

  function stopBgMusic() {
    if (bgInterval) { clearInterval(bgInterval); bgInterval = null; }
  }

  // ========== RESIZE ==========
  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    if (w < h) {
      // Device is portrait but CSS rotates it to landscape
      // so swap the dimensions
      W = canvas.width = h;
      H = canvas.height = w;
    } else {
      W = canvas.width = w;
      H = canvas.height = h;
    }
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', resize);
  resize();

  // ========== COORDINATE MAPPING ==========
  // In portrait mode the body is CSS-rotated to landscape.
  // Viewport (clientX/clientY) must be mapped to game coordinates.
  function mapClientToGame(clientX, clientY) {
    if (window.innerWidth < window.innerHeight) {
      // Portrait mode: body rotated 90deg CW, translateY(-100%)
      // transform-origin: top left
      return {
        x: clientY,
        y: window.innerWidth - clientX
      };
    }
    return { x: clientX, y: clientY };
  }

  // ========== GYROSCOPE ==========
  function handleOrientation(e) {
    if (state !== 'playing') return;
    let gamma = Math.max(-45, Math.min(45, e.gamma || 0));
    let beta = Math.max(-45, Math.min(45, e.beta || 0));
    tiltX = beta / 45;
    tiltY = -(gamma / 45);
  }

  function setupGyro() {
    window.addEventListener('deviceorientation', (e) => {
      if (e.gamma !== null) hasGyro = true;
      handleOrientation(e);
    });
    gyroPermGranted = true;
  }

  function requestGyroPermission() {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(response => {
        if (response === 'granted') {
          gyroPermGranted = true;
          hasGyro = true;
          localStorage.setItem('gyroPermission', 'granted');
          window.addEventListener('deviceorientation', handleOrientation);
        }
        state = 'title';
      }).catch(() => { state = 'title'; });
    } else {
      setupGyro();
      localStorage.setItem('gyroPermission', 'granted');
      state = 'title';
    }
  }

  // ========== MOUSE FALLBACK ==========
  canvas.addEventListener('mousemove', (e) => {
    if (state !== 'playing' || hasGyro) return;
    mouseActive = true;
    const pos = mapClientToGame(e.clientX, e.clientY);
    tiltX = (pos.x - W / 2) / (W / 2);
    tiltY = (pos.y - H / 2) / (H / 2);
  });

  // ========== TOUCH/CLICK HANDLING ==========
  let touchStartY = 0;
  let touchDragging = false;

  canvas.addEventListener('touchstart', (e) => {
    const pos = mapClientToGame(e.touches[0].clientX, e.touches[0].clientY);
    touchStartY = pos.y;
    touchDragging = false;
  }, { passive: true });

  canvas.addEventListener('touchmove', (e) => {
    const pos = mapClientToGame(e.touches[0].clientX, e.touches[0].clientY);
    const dy = pos.y - touchStartY;
    if (Math.abs(dy) > 5) touchDragging = true;
    if (state === 'levelSelect') {
      targetScrollY = Math.max(0, targetScrollY - (pos.y - touchStartY));
      touchStartY = pos.y;
    }
  }, { passive: true });

  canvas.addEventListener('wheel', (e) => {
    if (state === 'levelSelect') {
      targetScrollY = Math.max(0, targetScrollY + e.deltaY * 0.5);
    }
  }, { passive: true });

  canvas.addEventListener('click', (e) => {
    if (touchDragging) { touchDragging = false; return; }
    initAudio();
    const pos = mapClientToGame(e.clientX, e.clientY);
    const cx = pos.x, cy = pos.y;

    if (state === 'permission') {
      requestGyroPermission();
      return;
    }

    if (state === 'title') {
      state = 'worldSelect';
      return;
    }

    if (state === 'worldSelect') {
      handleWorldSelectClick(cx, cy);
      return;
    }

    if (state === 'levelSelect') {
      handleLevelSelectClick(cx, cy);
      return;
    }

    if (state === 'levelComplete') {
      // Next level button
      const btnY = H / 2 + 80;
      if (cy > btnY - 25 && cy < btnY + 25 && cx > W / 2 - 100 && cx < W / 2 + 100) {
        advanceLevel();
        return;
      }
      // Back button
      const backY = H / 2 + 130;
      if (cy > backY - 20 && cy < backY + 20) {
        state = 'levelSelect';
        return;
      }
      return;
    }

    if (state === 'gameover') {
      // Retry
      const retryY = H / 2 + 60;
      if (cy > retryY - 25 && cy < retryY + 25 && cx > W / 2 - 80 && cx < W / 2 + 80) {
        startLevel(currentWorld, currentLevel);
        return;
      }
      // Back
      const backY2 = H / 2 + 110;
      if (cy > backY2 - 20 && cy < backY2 + 20) {
        state = 'levelSelect';
        return;
      }
      return;
    }
  });

  function handleWorldSelectClick(cx, cy) {
    const startY = 100;
    const cardH = 80;
    const gap = 16;
    for (let i = 0; i < WORLDS.length; i++) {
      const y = startY + i * (cardH + gap);
      if (cy > y && cy < y + cardH && cx > 30 && cx < W - 30) {
        if (i < progress.worldsUnlocked) {
          currentWorld = i;
          state = 'levelSelect';
          scrollY = 0;
          targetScrollY = 0;
        }
        return;
      }
    }
  }

  function handleLevelSelectClick(cx, cy) {
    // Back button
    if (cy < 50 && cx < 80) {
      state = 'worldSelect';
      return;
    }

    const cols = 5;
    const cellW = (W - 60) / cols;
    const cellH = 80;
    const startY = 100 - scrollY;

    for (let i = 0; i < 10; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = 30 + col * cellW + cellW / 2;
      const y = startY + row * cellH + cellH / 2;
      const dist = Math.sqrt((cx - x) ** 2 + (cy - y) ** 2);
      if (dist < 30 && isLevelUnlocked(currentWorld, i)) {
        startLevel(currentWorld, i);
        return;
      }
    }
  }

  function advanceLevel() {
    if (currentLevel < 9) {
      startLevel(currentWorld, currentLevel + 1);
    } else if (currentWorld < 4) {
      currentWorld++;
      startLevel(currentWorld, 0);
    } else {
      state = 'worldSelect';
    }
  }

  // ========== STAR SPAWN ==========
  function spawnStar(moving) {
    const pad = 50;
    let x, y;
    for (let attempt = 0; attempt < 50; attempt++) {
      x = pad + Math.random() * (W - pad * 2);
      y = pad + Math.random() * (H - pad * 2);
      let valid = true;
      const dx = x - ball.x, dy = y - ball.y;
      if (Math.sqrt(dx * dx + dy * dy) < 80) { valid = false; continue; }
      for (const s of stars) {
        const sdx = x - s.x, sdy = y - s.y;
        if (Math.sqrt(sdx * sdx + sdy * sdy) < 60) { valid = false; break; }
      }
      for (const t of traps) {
        const tdx = x - t.x, tdy = y - t.y;
        if (Math.sqrt(tdx * tdx + tdy * tdy) < 60) { valid = false; break; }
      }
      if (valid) break;
    }
    stars.push({
      x, y, spawnTime: performance.now(), phase: Math.random() * Math.PI * 2,
      moving: moving || false,
      vx: moving ? (Math.random() - 0.5) * 60 : 0,
      vy: moving ? (Math.random() - 0.5) * 60 : 0,
      fruitType: Math.floor(Math.random() * 3) // 0=banana, 1=mango, 2=pineapple
    });
  }

  // ========== TRAP SPAWN ==========
  function spawnTrap(speed) {
    const pad = 60;
    let x, y;
    for (let attempt = 0; attempt < 50; attempt++) {
      x = pad + Math.random() * (W - pad * 2);
      y = pad + Math.random() * (H - pad * 2);
      const dx = x - ball.x, dy = y - ball.y;
      if (Math.sqrt(dx * dx + dy * dy) < 120) continue;
      break;
    }
    // Favor horizontal and diagonal patterns for landscape layout
    const pattern = Math.random();
    let angle;
    if (pattern < 0.4) {
      // Horizontal bouncing (slight vertical variation)
      angle = (Math.random() < 0.5 ? 0 : Math.PI) + (Math.random() - 0.5) * 0.3;
    } else if (pattern < 0.7) {
      // Diagonal paths
      angle = Math.PI * 0.25 + Math.floor(Math.random() * 4) * Math.PI * 0.5 + (Math.random() - 0.5) * 0.2;
    } else {
      // Fully random direction
      angle = Math.random() * Math.PI * 2;
    }
    traps.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      phase: Math.random() * Math.PI * 2,
      size: TRAP_RADIUS + Math.random() * 4,
      creatureType: Math.floor(Math.random() * 3) // 0=snake, 1=crocodile, 2=spider
    });
  }

  // ========== PARTICLES ==========
  function spawnAmbientParticles(worldIdx) {
    ambientParticles = [];
    if (worldIdx === 0) {
      // Jungle: multiple particle types - leaves, fireflies, pollen, mist
      // Falling leaves (12)
      for (let i = 0; i < 12; i++) {
        ambientParticles.push({
          x: Math.random() * W, y: Math.random() * H,
          vx: (Math.random() - 0.5) * 15,
          vy: 12 + Math.random() * 20,
          size: 2 + Math.random() * 3,
          phase: Math.random() * Math.PI * 2,
          alpha: 0.3 + Math.random() * 0.4,
          subtype: 'leaf',
          colorIdx: Math.floor(Math.random() * 4)
        });
      }
      // Fireflies (10)
      for (let i = 0; i < 10; i++) {
        ambientParticles.push({
          x: Math.random() * W, y: Math.random() * H,
          vx: (Math.random() - 0.5) * 8,
          vy: (Math.random() - 0.5) * 8,
          size: 1.5 + Math.random() * 1.5,
          phase: Math.random() * Math.PI * 2,
          alpha: 0.4 + Math.random() * 0.5,
          subtype: 'firefly'
        });
      }
      // Floating pollen (10)
      for (let i = 0; i < 10; i++) {
        ambientParticles.push({
          x: Math.random() * W, y: H * 0.4 + Math.random() * H * 0.6,
          vx: (Math.random() - 0.5) * 5,
          vy: -(3 + Math.random() * 5),
          size: 0.8 + Math.random() * 1,
          phase: Math.random() * Math.PI * 2,
          alpha: 0.2 + Math.random() * 0.3,
          subtype: 'pollen'
        });
      }
      // Mist patches near ground (4)
      for (let i = 0; i < 4; i++) {
        ambientParticles.push({
          x: Math.random() * W, y: H * 0.82 + Math.random() * H * 0.12,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 1,
          size: 40 + Math.random() * 30,
          phase: Math.random() * Math.PI * 2,
          alpha: 0.04 + Math.random() * 0.03,
          subtype: 'mist'
        });
      }
    } else {
      const count = 30;
      for (let i = 0; i < count; i++) {
        ambientParticles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 20,
          vy: WORLDS[worldIdx].particleType === 'rain' ? 100 + Math.random() * 100 :
              WORLDS[worldIdx].particleType === 'bubble' ? -(10 + Math.random() * 20) :
              (Math.random() - 0.5) * 15,
          size: 1 + Math.random() * 3,
          phase: Math.random() * Math.PI * 2,
          alpha: 0.2 + Math.random() * 0.5
        });
      }
    }
  }

  // ========== SPEED BOOST SPAWN ==========
  function spawnSpeedBoost() {
    const pad = 60;
    let x, y;
    for (let attempt = 0; attempt < 50; attempt++) {
      x = pad + Math.random() * (W - pad * 2);
      y = pad + Math.random() * (H - pad * 2);
      const dx = x - ball.x, dy = y - ball.y;
      if (Math.sqrt(dx * dx + dy * dy) < 100) continue;
      let valid = true;
      for (const t of traps) {
        const tdx = x - t.x, tdy = y - t.y;
        if (Math.sqrt(tdx * tdx + tdy * tdy) < 60) { valid = false; break; }
      }
      if (valid) break;
    }
    speedBoosts.push({
      x, y, phase: Math.random() * Math.PI * 2,
      spawnTime: performance.now()
    });
  }

  // ========== START LEVEL ==========
  function startLevel(worldIdx, levelIdx) {
    currentWorld = worldIdx;
    currentLevel = levelIdx;
    const cfg = getLevelConfig(levelIdx);
    const w = WORLDS[worldIdx];

    state = 'playing';
    score = 0;
    combo = 1;
    lastCollectTime = 0;
    levelPassScore = cfg.passScore || 200;
    levelGameTime = cfg.gameTime || 45;
    timeLeft = levelGameTime;
    trapInvulnTimer = 0;
    screenShake = 0;
    screenRedFlash = 0;
    speedBoostSpawnTimer = 15;
    ball.x = W / 2;
    ball.y = H / 2;
    ball.vx = 0;
    ball.vy = 0;
    trail.length = 0;
    stars = [];
    traps = [];
    effects = [];
    speedBoosts = [];
    speedBoostTimer = 0;
    tiltX = 0;
    tiltY = 0;

    for (let i = 0; i < cfg.starCount; i++) {
      spawnStar(cfg.movingStars && i >= cfg.starCount - 2);
    }
    for (let i = 0; i < cfg.trapCount; i++) {
      spawnTrap(cfg.trapSpeed);
    }
    // Speed boost spawns on timer for all worlds
    spawnSpeedBoost();
    spawnAmbientParticles(worldIdx);

    gameStartTime = performance.now();
    lastFrameTime = gameStartTime;

    startBgMusic(worldIdx);
  }

  // ========== EFFECTS ==========
  function addCollectEffect(x, y, points) {
    effects.push({ type: 'ring', x, y, t: 0, maxT: 0.5 });
    effects.push({ type: 'score', x, y: y - 10, t: 0, maxT: 0.8, text: '+' + points });
  }

  function addComboPopup(c) {
    effects.push({ type: 'combo', x: W / 2, y: H / 2 - 30, t: 0, maxT: 1.0, text: 'x' + c });
  }

  function addTrapHitEffect(x, y) {
    effects.push({ type: 'trapHit', x, y, t: 0, maxT: 0.6 });
    effects.push({ type: 'score', x, y: y - 10, t: 0, maxT: 0.8, text: '-' + TRAP_PENALTY + 's' });
  }

  // ========== UPDATE ==========
  function update(dt) {
    if (state !== 'playing') return;
    const w = WORLDS[currentWorld];
    const cfg = getLevelConfig(currentLevel);

    // Timer
    timeLeft -= dt;
    if (timeLeft <= 0) {
      timeLeft = 0;
      stopBgMusic();
      if (score >= levelPassScore) {
        earnedStars = scoreToStars(score, levelPassScore);
        const key = getLevelKey(currentWorld, currentLevel);
        if (earnedStars > (progress.levels[key] || 0)) {
          progress.levels[key] = earnedStars;
        }
        if (!progress.bestScores[key] || score > progress.bestScores[key]) {
          progress.bestScores[key] = score;
        }
        // Unlock next world if last level of current world
        if (currentLevel === 9 && currentWorld + 1 < WORLDS.length) {
          if (progress.worldsUnlocked <= currentWorld + 1) {
            progress.worldsUnlocked = currentWorld + 2;
          }
        }
        saveProgress();
        state = 'levelComplete';
      } else {
        state = 'gameover';
      }
      return;
    }

    // Combo decay
    const now = performance.now() / 1000;
    if (combo > 1 && now - lastCollectTime > COMBO_DECAY) combo = 1;

    // Trap invulnerability
    if (trapInvulnTimer > 0) trapInvulnTimer -= dt;
    if (screenShake > 0) screenShake -= dt;

    // Physics
    const friction = cfg.slippery ? Math.min(0.998, w.friction + 0.005) : w.friction;
    const boostMult = speedBoostTimer > 0 ? SPEED_BOOST_MULT : 1;
    const accelScale = 1120 * w.accelMult * boostMult;

    ball.vx += tiltX * TILT_SENSITIVITY * accelScale * dt;
    ball.vy += tiltY * TILT_SENSITIVITY * accelScale * dt;
    ball.vx *= Math.pow(friction, dt * 60);
    ball.vy *= Math.pow(friction, dt * 60);
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    // Wall bounce
    if (ball.x - BALL_RADIUS < 0) { ball.x = BALL_RADIUS; ball.vx = Math.abs(ball.vx) * BOUNCE_LOSS; }
    if (ball.x + BALL_RADIUS > W) { ball.x = W - BALL_RADIUS; ball.vx = -Math.abs(ball.vx) * BOUNCE_LOSS; }
    if (ball.y - BALL_RADIUS < 0) { ball.y = BALL_RADIUS; ball.vy = Math.abs(ball.vy) * BOUNCE_LOSS; }
    if (ball.y + BALL_RADIUS > H) { ball.y = H - BALL_RADIUS; ball.vy = -Math.abs(ball.vy) * BOUNCE_LOSS; }

    // Trail
    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    if (speed > 10) {
      trail.push({ x: ball.x, y: ball.y, age: 0 });
      if (trail.length > TRAIL_LENGTH) trail.shift();
    }
    for (const t of trail) t.age += dt;
    while (trail.length > 0 && trail[0].age > 0.3) trail.shift();

    // Stars movement & expiration
    for (let i = stars.length - 1; i >= 0; i--) {
      const s = stars[i];
      if (s.moving) {
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        if (s.x < 40 || s.x > W - 40) s.vx *= -1;
        if (s.y < 40 || s.y > H - 40) s.vy *= -1;
        s.x = Math.max(40, Math.min(W - 40, s.x));
        s.y = Math.max(40, Math.min(H - 40, s.y));
      }
      // Star expiration after STAR_LIFETIME seconds
      const starAge = (performance.now() - s.spawnTime) / 1000;
      if (starAge >= STAR_LIFETIME) {
        stars.splice(i, 1);
        spawnStar(cfg.movingStars && Math.random() > 0.4);
      }
    }

    // Star collision
    for (let i = stars.length - 1; i >= 0; i--) {
      const s = stars[i];
      const dx = ball.x - s.x, dy = ball.y - s.y;
      if (Math.sqrt(dx * dx + dy * dy) < BALL_RADIUS + STAR_RADIUS) {
        const now2 = performance.now() / 1000;
        if (now2 - lastCollectTime < COMBO_DECAY) {
          combo = Math.min(8, combo * 2);
        } else {
          combo = 1;
        }
        lastCollectTime = now2;
        const points = 10 * combo;
        score += points;
        playCollectSound(currentWorld);
        addCollectEffect(s.x, s.y, points);
        if (combo >= 3) addComboPopup(combo);
        stars.splice(i, 1);
        spawnStar(cfg.movingStars && Math.random() > 0.4);
      }
    }

    // Traps movement
    for (const t of traps) {
      t.x += t.vx * dt;
      t.y += t.vy * dt;
      if (t.x < TRAP_RADIUS || t.x > W - TRAP_RADIUS) t.vx *= -1;
      if (t.y < TRAP_RADIUS || t.y > H - TRAP_RADIUS) t.vy *= -1;
      t.x = Math.max(TRAP_RADIUS, Math.min(W - TRAP_RADIUS, t.x));
      t.y = Math.max(TRAP_RADIUS, Math.min(H - TRAP_RADIUS, t.y));
    }

    // Trap collision
    if (trapInvulnTimer <= 0) {
      for (const t of traps) {
        const dx = ball.x - t.x, dy = ball.y - t.y;
        if (Math.sqrt(dx * dx + dy * dy) < BALL_RADIUS + t.size) {
          timeLeft = Math.max(0, timeLeft - TRAP_PENALTY);
          trapInvulnTimer = TRAP_INVULN;
          screenShake = 0.3;
          screenRedFlash = 0.3;
          playTrapSound();
          addTrapHitEffect(t.x, t.y);
          // Bounce ball away
          const angle = Math.atan2(dy, dx);
          ball.vx = Math.cos(angle) * 200;
          ball.vy = Math.sin(angle) * 200;
          break;
        }
      }
    }

    // Speed boost collision & timer
    if (speedBoostTimer > 0) speedBoostTimer -= dt;
    if (screenRedFlash > 0) screenRedFlash -= dt;
    // Speed boost spawn timer (every 15 seconds for all worlds)
    if (speedBoosts.length === 0 && speedBoostTimer <= 0) {
      speedBoostSpawnTimer -= dt;
      if (speedBoostSpawnTimer <= 0) {
        spawnSpeedBoost();
        speedBoostSpawnTimer = 15;
      }
    }
    for (let i = speedBoosts.length - 1; i >= 0; i--) {
      const sb = speedBoosts[i];
      const dx2 = ball.x - sb.x, dy2 = ball.y - sb.y;
      if (Math.sqrt(dx2 * dx2 + dy2 * dy2) < BALL_RADIUS + SPEED_BOOST_RADIUS) {
        speedBoostTimer = SPEED_BOOST_DURATION;
        speedBoosts.splice(i, 1);
        effects.push({ type: 'ring', x: sb.x, y: sb.y, t: 0, maxT: 0.5 });
        effects.push({ type: 'score', x: sb.x, y: sb.y - 10, t: 0, maxT: 0.8, text: '\u26A1 SPEED!' });
        speedBoostSpawnTimer = 15;
      }
    }

    // Ambient particles
    for (const p of ambientParticles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.phase += dt * 2;
      // Jungle subtype-specific movement
      if (p.subtype === 'firefly') {
        p.x += Math.sin(p.phase * 1.3) * 18 * dt;
        p.y += Math.cos(p.phase * 0.9) * 12 * dt;
      } else if (p.subtype === 'leaf') {
        p.x += Math.sin(p.phase * 0.5) * 25 * dt;
      } else if (p.subtype === 'pollen') {
        p.x += Math.sin(p.phase * 0.8) * 8 * dt;
      } else if (p.subtype === 'mist') {
        // Mist stays near ground level
        if (p.y < H * 0.75) p.y = H * 0.85;
      } else {
        if (w.particleType === 'firefly') {
          p.x += Math.sin(p.phase) * 15 * dt;
          p.y += Math.cos(p.phase * 0.7) * 10 * dt;
        }
        if (w.particleType === 'fallingLeaf') {
          p.x += Math.sin(p.phase * 0.5) * 20 * dt;
        }
      }
      // Wrap
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10;
      if (p.y > H + 10) p.y = -10;
    }

    // Update effects
    for (let i = effects.length - 1; i >= 0; i--) {
      effects[i].t += dt;
      if (effects[i].t >= effects[i].maxT) effects.splice(i, 1);
    }
  }

  // ========== DRAW HELPERS ==========
  function drawJungleBackground() {
    if (jungleBg.complete && jungleBg.naturalWidth > 0) {
      const imgRatio = jungleBg.naturalWidth / jungleBg.naturalHeight;
      const canvasRatio = canvas.width / canvas.height;
      let drawW, drawH, drawX, drawY;

      if (imgRatio > canvasRatio) {
        drawW = canvas.width;
        drawH = drawW / imgRatio;
        drawX = 0;
        drawY = (canvas.height - drawH) / 2;
      } else {
        drawH = canvas.height;
        drawW = drawH * imgRatio;
        drawX = (canvas.width - drawW) / 2;
        drawY = 0;
      }
      ctx.drawImage(jungleBg, drawX, drawY, drawW, drawH);
    } else {
      ctx.fillStyle = '#0d2b0d';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Subtle dark overlay for readability of game elements
    ctx.fillStyle = 'rgba(0, 10, 0, 0.25)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Torch/flashlight lighting overlay for jungle
  function drawJungleLighting() {
    // Dark vignette with bright spot around ball
    const lg = ctx.createRadialGradient(ball.x, ball.y, 40, ball.x, ball.y, 220);
    lg.addColorStop(0, 'rgba(0,0,0,0)');
    lg.addColorStop(0.4, 'rgba(0,0,0,0.05)');
    lg.addColorStop(0.7, 'rgba(0,10,0,0.15)');
    lg.addColorStop(1, 'rgba(0,5,0,0.3)');
    ctx.fillStyle = lg;
    ctx.fillRect(-10, -10, W + 20, H + 20);
  }

  function drawGrid(color) {
    ctx.strokeStyle = color || 'rgba(50,70,120,0.12)';
    ctx.lineWidth = 1;
    const step = 40;
    for (let x = 0; x < W; x += step) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += step) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  function drawStar5(cx, cy, r, innerR) {
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const angle = (Math.PI / 2 * 3) + (i * Math.PI / 5);
      const rad = i % 2 === 0 ? r : innerR;
      ctx.lineTo(cx + Math.cos(angle) * rad, cy + Math.sin(angle) * rad);
    }
    ctx.closePath();
  }

  // ========== DRAW THEMED SHAPES ==========
  function drawThemedStar(x, y, r, worldIdx, phase, fruitType) {
    const w = WORLDS[worldIdx];
    // Jungle fruits are much larger
    const drawR = worldIdx === 0 ? Math.max(r, 24) : r;
    const time = performance.now() / 1000;

    const sg = ctx.createRadialGradient(x, y, 0, x, y, drawR);
    sg.addColorStop(0, w.starColors[0]);
    sg.addColorStop(0.6, w.starColors[1]);
    sg.addColorStop(1, w.starColors[2]);

    ctx.save();
    ctx.shadowColor = w.starColors[0];
    ctx.shadowBlur = 15 + 5 * Math.sin(phase);

    // Gentle bob animation for jungle fruits
    let bobY = 0;
    if (worldIdx === 0) {
      bobY = Math.sin(time * 2.5 + phase) * 3;
    }

    switch (w.starShape) {
      case 'fruit': {
        const ft = (typeof fruitType === 'number') ? fruitType : 0;
        const fy = y + bobY;

        // Drop shadow for all fruits
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath();
        ctx.ellipse(x + 2, fy + drawR * 0.6, drawR * 0.5, drawR * 0.15, 0, 0, Math.PI * 2);
        ctx.fill();

        // Warm glow underneath
        const glowGrad = ctx.createRadialGradient(x, fy + drawR * 0.3, 0, x, fy + drawR * 0.3, drawR * 0.8);
        if (ft === 0) {
          glowGrad.addColorStop(0, 'rgba(255,220,50,0.12)');
        } else if (ft === 1) {
          glowGrad.addColorStop(0, 'rgba(255,140,50,0.12)');
        } else {
          glowGrad.addColorStop(0, 'rgba(255,200,50,0.12)');
        }
        glowGrad.addColorStop(1, 'rgba(255,200,50,0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(x, fy + drawR * 0.3, drawR * 0.8, 0, Math.PI * 2);
        ctx.fill();

        if (ft === 0) {
          // BANANA - curved crescent shape
          ctx.save();
          ctx.translate(x, fy);
          ctx.rotate(0.3);
          // Main curved crescent body
          ctx.beginPath();
          ctx.moveTo(-drawR * 0.05, -drawR * 0.85);
          ctx.bezierCurveTo(-drawR * 0.7, -drawR * 0.5, -drawR * 0.85, drawR * 0.1, -drawR * 0.6, drawR * 0.65);
          ctx.bezierCurveTo(-drawR * 0.4, drawR * 0.85, -drawR * 0.1, drawR * 0.8, drawR * 0.05, drawR * 0.6);
          ctx.bezierCurveTo(drawR * 0.15, drawR * 0.35, drawR * 0.2, -drawR * 0.1, drawR * 0.1, -drawR * 0.4);
          ctx.bezierCurveTo(drawR * 0.05, -drawR * 0.65, 0, -drawR * 0.8, -drawR * 0.05, -drawR * 0.85);
          ctx.closePath();
          const bg = ctx.createLinearGradient(-drawR * 0.6, 0, drawR * 0.15, 0);
          bg.addColorStop(0, '#c8a810');
          bg.addColorStop(0.2, '#e6c619');
          bg.addColorStop(0.5, '#FFE135');
          bg.addColorStop(0.8, '#FFD700');
          bg.addColorStop(1, '#c8a810');
          ctx.fillStyle = bg;
          ctx.fill();
          // Darker edges
          ctx.strokeStyle = 'rgba(150,120,20,0.3)';
          ctx.lineWidth = 1;
          ctx.stroke();
          // Brown tip top
          ctx.beginPath();
          ctx.ellipse(-drawR * 0.05, -drawR * 0.82, drawR * 0.08, drawR * 0.06, 0.3, 0, Math.PI * 2);
          ctx.fillStyle = '#5a4010';
          ctx.fill();
          // Brown tip bottom
          ctx.beginPath();
          ctx.ellipse(-drawR * 0.55, drawR * 0.65, drawR * 0.06, drawR * 0.05, -0.5, 0, Math.PI * 2);
          ctx.fillStyle = '#5a4010';
          ctx.fill();
          // Subtle center highlight
          ctx.strokeStyle = 'rgba(255,255,200,0.15)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.bezierCurveTo(-drawR * 0.3, -drawR * 0.2, -drawR * 0.4, drawR * 0.2, -drawR * 0.3, drawR * 0.4);
          ctx.stroke();
          ctx.restore();
        } else if (ft === 1) {
          // MANGO - plump oval with warm gradient
          ctx.beginPath();
          ctx.ellipse(x, fy, drawR * 0.65, drawR * 0.85, 0.15, 0, Math.PI * 2);
          const mg = ctx.createRadialGradient(x - drawR * 0.25, fy - drawR * 0.25, 0, x, fy, drawR * 0.9);
          mg.addColorStop(0, '#FF5040');
          mg.addColorStop(0.3, '#FF6347');
          mg.addColorStop(0.6, '#FF8C00');
          mg.addColorStop(1, '#E08000');
          ctx.fillStyle = mg;
          ctx.fill();
          // Mango skin color variation
          ctx.beginPath();
          ctx.ellipse(x + drawR * 0.15, fy + drawR * 0.2, drawR * 0.35, drawR * 0.45, 0.2, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,200,50,0.2)';
          ctx.fill();
          // Shine highlight upper left
          const mShine = ctx.createRadialGradient(x - drawR * 0.25, fy - drawR * 0.35, 0, x - drawR * 0.2, fy - drawR * 0.3, drawR * 0.3);
          mShine.addColorStop(0, 'rgba(255,255,255,0.45)');
          mShine.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = mShine;
          ctx.beginPath();
          ctx.ellipse(x - drawR * 0.2, fy - drawR * 0.3, drawR * 0.25, drawR * 0.18, -0.3, 0, Math.PI * 2);
          ctx.fill();
          // Green leaf stub on top
          ctx.fillStyle = '#3a7a1a';
          ctx.save();
          ctx.translate(x + drawR * 0.2, fy - drawR * 0.78);
          ctx.rotate(-0.3);
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.bezierCurveTo(drawR * 0.15, -drawR * 0.12, drawR * 0.3, -drawR * 0.08, drawR * 0.35, drawR * 0.02);
          ctx.bezierCurveTo(drawR * 0.2, drawR * 0.05, drawR * 0.08, drawR * 0.03, 0, 0);
          ctx.fill();
          ctx.restore();
          // Stem
          ctx.strokeStyle = '#5a4020';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x + drawR * 0.15, fy - drawR * 0.75);
          ctx.lineTo(x + drawR * 0.2, fy - drawR * 0.85);
          ctx.stroke();
        } else {
          // PINEAPPLE - round body with diamond grid + spiky crown
          ctx.save();
          ctx.translate(x, fy);
          // Body
          ctx.beginPath();
          ctx.ellipse(0, drawR * 0.1, drawR * 0.6, drawR * 0.7, 0, 0, Math.PI * 2);
          const pg = ctx.createRadialGradient(-drawR * 0.15, -drawR * 0.1, 0, 0, drawR * 0.1, drawR * 0.7);
          pg.addColorStop(0, '#FFE44D');
          pg.addColorStop(0.4, '#FFD700');
          pg.addColorStop(0.7, '#DAA520');
          pg.addColorStop(1, '#B8860B');
          ctx.fillStyle = pg;
          ctx.fill();

          // Diamond grid pattern
          ctx.strokeStyle = 'rgba(139,80,10,0.45)';
          ctx.lineWidth = 0.8;
          // Diagonal lines one way
          for (let i = -3; i <= 3; i++) {
            ctx.beginPath();
            ctx.moveTo(i * drawR * 0.22 - drawR * 0.4, -drawR * 0.5);
            ctx.lineTo(i * drawR * 0.22 + drawR * 0.15, drawR * 0.75);
            ctx.stroke();
          }
          // Diagonal lines other way
          for (let i = -3; i <= 3; i++) {
            ctx.beginPath();
            ctx.moveTo(i * drawR * 0.22 + drawR * 0.4, -drawR * 0.5);
            ctx.lineTo(i * drawR * 0.22 - drawR * 0.15, drawR * 0.75);
            ctx.stroke();
          }
          // Small dots at diamond intersections
          ctx.fillStyle = 'rgba(120,70,10,0.25)';
          for (let gy = -2; gy <= 2; gy++) {
            for (let gx = -1; gx <= 1; gx++) {
              ctx.beginPath();
              ctx.arc(gx * drawR * 0.25, gy * drawR * 0.22 + drawR * 0.1, 1.5, 0, Math.PI * 2);
              ctx.fill();
            }
          }

          // Green spiky crown (5-6 pointed leaves)
          const crownLeaves = [
            { cx: 0, a: 0, h: drawR * 0.55 },
            { cx: -drawR * 0.12, a: -0.25, h: drawR * 0.45 },
            { cx: drawR * 0.12, a: 0.25, h: drawR * 0.45 },
            { cx: -drawR * 0.22, a: -0.45, h: drawR * 0.35 },
            { cx: drawR * 0.22, a: 0.45, h: drawR * 0.35 },
            { cx: 0, a: 0.1, h: drawR * 0.5 }
          ];
          for (const cl of crownLeaves) {
            ctx.save();
            ctx.translate(cl.cx, -drawR * 0.58);
            ctx.rotate(cl.a);
            ctx.beginPath();
            ctx.moveTo(-drawR * 0.06, 0);
            ctx.bezierCurveTo(-drawR * 0.04, -cl.h * 0.4, drawR * 0.01, -cl.h * 0.7, 0, -cl.h);
            ctx.bezierCurveTo(drawR * 0.02, -cl.h * 0.7, drawR * 0.06, -cl.h * 0.4, drawR * 0.06, 0);
            ctx.closePath();
            ctx.fillStyle = cl.h > drawR * 0.4 ? '#1a8a22' : '#228B22';
            ctx.fill();
            // Leaf center line
            ctx.strokeStyle = 'rgba(0,50,0,0.3)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -cl.h * 0.9);
            ctx.stroke();
            ctx.restore();
          }

          // Warm golden glow
          const pGlow = ctx.createRadialGradient(0, drawR * 0.1, drawR * 0.3, 0, drawR * 0.1, drawR * 0.8);
          pGlow.addColorStop(0, 'rgba(255,215,0,0)');
          pGlow.addColorStop(1, 'rgba(255,200,50,0.08)');
          ctx.fillStyle = pGlow;
          ctx.beginPath();
          ctx.arc(0, drawR * 0.1, drawR * 0.8, 0, Math.PI * 2);
          ctx.fill();

          ctx.restore();
        }
        break;
      }

      case 'leaf':
        ctx.beginPath();
        ctx.ellipse(x, y, r * 0.5, r, phase * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = sg;
        ctx.fill();
        // Stem
        ctx.beginPath();
        ctx.moveTo(x, y - r);
        ctx.quadraticCurveTo(x + r * 0.3, y, x, y + r);
        ctx.strokeStyle = w.starColors[2];
        ctx.lineWidth = 1.5;
        ctx.stroke();
        break;

      case 'gem':
        ctx.beginPath();
        ctx.moveTo(x, y - r);
        ctx.lineTo(x + r * 0.7, y - r * 0.2);
        ctx.lineTo(x + r * 0.5, y + r);
        ctx.lineTo(x - r * 0.5, y + r);
        ctx.lineTo(x - r * 0.7, y - r * 0.2);
        ctx.closePath();
        ctx.fillStyle = sg;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();
        break;

      case 'shell':
        ctx.beginPath();
        ctx.arc(x, y + r * 0.2, r * 0.9, Math.PI, 0);
        ctx.quadraticCurveTo(x + r * 0.3, y + r, x, y + r * 0.8);
        ctx.quadraticCurveTo(x - r * 0.3, y + r, x - r * 0.9, y + r * 0.2);
        ctx.closePath();
        ctx.fillStyle = sg;
        ctx.fill();
        // Ridge lines
        for (let i = 1; i < 4; i++) {
          ctx.beginPath();
          ctx.arc(x, y + r * 0.2, r * 0.9 * (i / 4), Math.PI * 1.1, Math.PI * -0.1);
          ctx.strokeStyle = `rgba(255,255,255,${0.15})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
        break;

      case 'coin':
        ctx.beginPath();
        ctx.arc(x, y, r * 0.85, 0, Math.PI * 2);
        ctx.fillStyle = sg;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,200,0,0.6)';
        ctx.lineWidth = 2;
        ctx.stroke();
        // Dollar sign
        ctx.font = `bold ${r}px Orbitron`;
        ctx.fillStyle = 'rgba(180,120,0,0.6)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('$', x, y);
        break;

      case 'star':
      default:
        drawStar5(x, y, r, r * 0.45);
        ctx.fillStyle = sg;
        ctx.fill();
        break;
    }
    ctx.restore();
  }

  function drawThemedTrap(t, worldIdx, time) {
    const w = WORLDS[worldIdx];
    const { x, y, size, phase } = t;
    const wobble = Math.sin(time * 3 + phase) * 0.1;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(wobble);

    switch (w.trapShape) {
      case 'thorn':
        // Thorny vine ball (legacy fallback)
        ctx.fillStyle = w.trapColor;
        ctx.beginPath();
        ctx.arc(0, 0, size * 0.6, 0, Math.PI * 2);
        ctx.fill();
        break;

      case 'jungleCreature': {
        const ct = t.creatureType || 0;
        if (ct === 0) {
          // SNAKE - thick body, diamond pattern, triangular head, forked tongue
          ctx.rotate(-wobble);
          const segments = 10;
          const segW = size * 0.42;

          // Compute snake positions along sine wave
          const pts = [];
          for (let i = 0; i < segments; i++) {
            pts.push({
              x: (i - segments / 2) * segW * 0.75,
              y: Math.sin(time * 3.5 + i * 0.7 + phase) * size * 0.45
            });
          }

          // Draw body segments (thick, 8px style)
          for (let i = segments - 1; i >= 1; i--) {
            const s = pts[i];
            const thickness = segW * (0.32 + 0.06 * Math.sin(i * 0.7));
            // Base green body
            ctx.beginPath();
            ctx.arc(s.x, s.y, thickness, 0, Math.PI * 2);
            ctx.fillStyle = i % 2 === 0 ? '#2a9a2a' : '#35b535';
            ctx.fill();
            // Darker diamond pattern on back
            if (i % 2 === 0 && i > 0 && i < segments - 1) {
              ctx.save();
              ctx.translate(s.x, s.y);
              const ang = Math.atan2(pts[i].y - pts[i - 1].y, pts[i].x - pts[i - 1].x);
              ctx.rotate(ang);
              ctx.beginPath();
              ctx.moveTo(0, -thickness * 0.6);
              ctx.lineTo(thickness * 0.5, 0);
              ctx.lineTo(0, thickness * 0.6);
              ctx.lineTo(-thickness * 0.5, 0);
              ctx.closePath();
              ctx.fillStyle = 'rgba(15,80,15,0.5)';
              ctx.fill();
              ctx.restore();
            }
          }

          // Triangular head (first point)
          const head = pts[0];
          const neck = pts[1];
          const headAngle = Math.atan2(head.y - neck.y, head.x - neck.x);
          ctx.save();
          ctx.translate(head.x, head.y);
          ctx.rotate(headAngle);
          // Head triangle
          ctx.beginPath();
          ctx.moveTo(segW * 0.5, 0);
          ctx.lineTo(-segW * 0.2, -segW * 0.35);
          ctx.lineTo(-segW * 0.2, segW * 0.35);
          ctx.closePath();
          ctx.fillStyle = '#1a7a1a';
          ctx.fill();

          // Yellow eyes with slit pupils
          ctx.fillStyle = '#ffdd00';
          ctx.beginPath();
          ctx.ellipse(segW * 0.1, -segW * 0.2, 3.5, 4, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(segW * 0.1, segW * 0.2, 3.5, 4, 0, 0, Math.PI * 2);
          ctx.fill();
          // Vertical slit pupils
          ctx.fillStyle = '#000';
          ctx.beginPath();
          ctx.ellipse(segW * 0.1, -segW * 0.2, 1.2, 3.5, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(segW * 0.1, segW * 0.2, 1.2, 3.5, 0, 0, Math.PI * 2);
          ctx.fill();

          // Forked red tongue (flickering)
          const tongueLen = segW * 0.5 * (0.8 + 0.4 * Math.sin(time * 8 + phase));
          ctx.strokeStyle = '#dd2222';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(segW * 0.45, 0);
          ctx.lineTo(segW * 0.45 + tongueLen, 0);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(segW * 0.45 + tongueLen * 0.7, 0);
          ctx.lineTo(segW * 0.45 + tongueLen, -4);
          ctx.moveTo(segW * 0.45 + tongueLen * 0.7, 0);
          ctx.lineTo(segW * 0.45 + tongueLen, 4);
          ctx.stroke();
          ctx.restore();

        } else if (ct === 1) {
          // CROCODILE - long body, bumpy ridge, visible teeth, red eyes
          const S = size;
          // Body - slightly rounded green rectangle
          const bodyGrad = ctx.createLinearGradient(0, -S * 0.35, 0, S * 0.35);
          bodyGrad.addColorStop(0, '#2a5a1a');
          bodyGrad.addColorStop(0.3, '#3a7a2a');
          bodyGrad.addColorStop(0.7, '#3a7a2a');
          bodyGrad.addColorStop(1, '#2a5a1a');
          ctx.fillStyle = bodyGrad;
          ctx.beginPath();
          ctx.roundRect(-S * 1.2, -S * 0.3, S * 2.4, S * 0.6, 6);
          ctx.fill();

          // Darker bumpy ridge along back (series of small triangles)
          ctx.fillStyle = '#1a4a10';
          for (let i = 0; i < 8; i++) {
            const rx = -S * 0.8 + i * S * 0.25;
            ctx.beginPath();
            ctx.moveTo(rx - 4, -S * 0.28);
            ctx.lineTo(rx, -S * 0.42);
            ctx.lineTo(rx + 4, -S * 0.28);
            ctx.closePath();
            ctx.fill();
          }

          // Head slightly wider
          ctx.fillStyle = '#3a7a2a';
          ctx.beginPath();
          ctx.roundRect(-S * 1.5, -S * 0.35, S * 0.45, S * 0.7, [8, 2, 2, 8]);
          ctx.fill();

          // Teeth visible (white zigzag at jaw)
          ctx.fillStyle = '#f0f0e8';
          for (let i = 0; i < 5; i++) {
            const tx2 = -S * 1.5 + i * S * 0.09;
            // Top teeth
            ctx.beginPath();
            ctx.moveTo(tx2, -S * 0.08);
            ctx.lineTo(tx2 + S * 0.045, S * 0.06);
            ctx.lineTo(tx2 + S * 0.09, -S * 0.08);
            ctx.fill();
            // Bottom teeth
            ctx.beginPath();
            ctx.moveTo(tx2, S * 0.08);
            ctx.lineTo(tx2 + S * 0.045, -S * 0.04);
            ctx.lineTo(tx2 + S * 0.09, S * 0.08);
            ctx.fill();
          }

          // Small red eyes
          ctx.fillStyle = '#cc2200';
          ctx.beginPath();
          ctx.arc(-S * 1.15, -S * 0.2, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#000';
          ctx.beginPath();
          ctx.arc(-S * 1.15, -S * 0.2, 1.5, 0, Math.PI * 2);
          ctx.fill();

          // Nostril
          ctx.fillStyle = 'rgba(0,0,0,0.3)';
          ctx.beginPath();
          ctx.ellipse(-S * 1.42, -S * 0.15, 2, 1.5, 0, 0, Math.PI * 2);
          ctx.fill();

          // Tail with sine wave
          ctx.strokeStyle = '#3a7a2a';
          ctx.lineWidth = S * 0.28;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(S * 1.0, 0);
          ctx.bezierCurveTo(
            S * 1.3, Math.sin(time * 2.5 + phase) * S * 0.35,
            S * 1.5, Math.sin(time * 2.5 + phase + 1) * S * 0.25,
            S * 1.6, Math.sin(time * 2.5 + phase + 2) * S * 0.15
          );
          ctx.stroke();
          ctx.lineCap = 'butt';

          // Belly texture
          ctx.fillStyle = 'rgba(80,120,50,0.2)';
          ctx.beginPath();
          ctx.roundRect(-S * 0.8, S * 0.05, S * 1.6, S * 0.18, 3);
          ctx.fill();

          // Legs (small stubs)
          ctx.fillStyle = '#2a5a1a';
          ctx.beginPath();
          ctx.ellipse(-S * 0.5, S * 0.35, S * 0.12, S * 0.08, 0.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(S * 0.4, S * 0.35, S * 0.12, S * 0.08, -0.2, 0, Math.PI * 2);
          ctx.fill();

        } else {
          // SPIDER - large black body, 8 thick jointed legs, red hourglass, silk thread
          const S = size;

          // Silk thread from top of screen
          ctx.strokeStyle = 'rgba(200,200,200,0.25)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(0, -S * 0.4);
          // Convert to screen coords for thread to top
          ctx.lineTo(0, -(y + S * 0.4));
          ctx.stroke();

          // Brown head (cephalothorax)
          ctx.fillStyle = '#3a2a1a';
          ctx.beginPath();
          ctx.ellipse(0, -S * 0.15, S * 0.3, S * 0.25, 0, 0, Math.PI * 2);
          ctx.fill();

          // Large black oval abdomen
          ctx.fillStyle = '#111';
          ctx.beginPath();
          ctx.ellipse(0, S * 0.25, S * 0.35, S * 0.4, 0, 0, Math.PI * 2);
          ctx.fill();
          // Abdomen sheen
          const abdSheen = ctx.createRadialGradient(-S * 0.08, S * 0.15, 0, 0, S * 0.25, S * 0.35);
          abdSheen.addColorStop(0, 'rgba(60,60,60,0.3)');
          abdSheen.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = abdSheen;
          ctx.beginPath();
          ctx.ellipse(0, S * 0.25, S * 0.35, S * 0.4, 0, 0, Math.PI * 2);
          ctx.fill();

          // Red hourglass marking
          ctx.fillStyle = '#cc1100';
          ctx.beginPath();
          ctx.moveTo(0, S * 0.1);
          ctx.lineTo(-S * 0.08, S * 0.2);
          ctx.lineTo(0, S * 0.25);
          ctx.lineTo(S * 0.08, S * 0.2);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(0, S * 0.25);
          ctx.lineTo(-S * 0.08, S * 0.35);
          ctx.lineTo(0, S * 0.4);
          ctx.lineTo(S * 0.08, S * 0.35);
          ctx.closePath();
          ctx.fill();

          // 8 thick legs with joints (bent in middle)
          ctx.strokeStyle = '#1a1a1a';
          ctx.lineWidth = 3;
          ctx.lineCap = 'round';
          const legSway = Math.sin(time * 3 + phase) * 0.15;
          for (let i = 0; i < 8; i++) {
            const side = i < 4 ? -1 : 1;
            const idx = i % 4;
            const baseAng = (-0.6 - idx * 0.35) + legSway * (idx % 2 === 0 ? 1 : -1);
            const legLen = S * (0.7 + idx * 0.1);
            // Body attachment point
            const ax = side * S * 0.2;
            const ay = -S * 0.15 + idx * S * 0.06;
            // Knee (bent upward)
            const kneeAng = baseAng + side * 0.3;
            const kneeX = ax + Math.cos(kneeAng) * legLen * 0.5 * side;
            const kneeY = ay + Math.sin(kneeAng) * legLen * 0.5 - S * 0.25;
            // Foot
            const footX = kneeX + Math.cos(kneeAng + 1.2 * side) * legLen * 0.55 * side;
            const footY = kneeY + Math.abs(Math.sin(kneeAng + 1.2)) * legLen * 0.55 + S * 0.15;
            ctx.beginPath();
            ctx.moveTo(ax, ay);
            ctx.lineTo(kneeX, kneeY);
            ctx.lineTo(footX, footY);
            ctx.stroke();
          }
          ctx.lineCap = 'butt';

          // 8 tiny red eyes (two rows)
          ctx.fillStyle = '#ff2200';
          const eyeRow1 = [-3, -1, 1, 3];
          const eyeRow2 = [-2, 2];
          for (const ex of eyeRow1) {
            ctx.beginPath();
            ctx.arc(ex * 1.5, -S * 0.3, 1.5, 0, Math.PI * 2);
            ctx.fill();
          }
          for (const ex of eyeRow2) {
            ctx.beginPath();
            ctx.arc(ex * 2, -S * 0.22, 1.2, 0, Math.PI * 2);
            ctx.fill();
          }
          // Small eye glints
          ctx.fillStyle = 'rgba(255,100,80,0.5)';
          for (const ex of eyeRow1) {
            ctx.beginPath();
            ctx.arc(ex * 1.5 - 0.5, -S * 0.31, 0.5, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        break;
      }

      case 'cactus':
        ctx.fillStyle = w.trapColor;
        // Body
        ctx.beginPath();
        ctx.roundRect(-size * 0.3, -size, size * 0.6, size * 2, 5);
        ctx.fill();
        // Arms
        ctx.beginPath();
        ctx.roundRect(-size, -size * 0.6, size * 0.7, size * 0.3, 3);
        ctx.fill();
        ctx.beginPath();
        ctx.roundRect(size * 0.3, size * 0.1, size * 0.7, size * 0.3, 3);
        ctx.fill();
        // Spines
        ctx.strokeStyle = '#90ee90';
        ctx.lineWidth = 1;
        for (let i = 0; i < 6; i++) {
          const sy = -size + i * size * 0.4;
          ctx.beginPath();
          ctx.moveTo(-size * 0.3, sy);
          ctx.lineTo(-size * 0.5, sy - 3);
          ctx.moveTo(size * 0.3, sy);
          ctx.lineTo(size * 0.5, sy - 3);
          ctx.stroke();
        }
        break;

      case 'jellyfish':
        // Bell
        ctx.beginPath();
        ctx.arc(0, -size * 0.2, size * 0.7, Math.PI, 0);
        ctx.quadraticCurveTo(size * 0.7, size * 0.3, 0, size * 0.2);
        ctx.quadraticCurveTo(-size * 0.7, size * 0.3, -size * 0.7, -size * 0.2);
        const jg = ctx.createRadialGradient(0, -size * 0.2, 0, 0, 0, size);
        jg.addColorStop(0, 'rgba(255,180,255,0.8)');
        jg.addColorStop(1, w.trapColor);
        ctx.fillStyle = jg;
        ctx.fill();
        // Tentacles
        ctx.strokeStyle = 'rgba(200,100,200,0.6)';
        ctx.lineWidth = 1.5;
        for (let i = -2; i <= 2; i++) {
          ctx.beginPath();
          ctx.moveTo(i * size * 0.2, size * 0.2);
          const waveMod = Math.sin(time * 4 + i + phase);
          ctx.quadraticCurveTo(i * size * 0.2 + waveMod * 8, size * 0.6, i * size * 0.15, size);
          ctx.stroke();
        }
        break;

      case 'car':
        // Car body
        ctx.fillStyle = w.trapColor;
        ctx.beginPath();
        ctx.roundRect(-size, -size * 0.4, size * 2, size * 0.8, 4);
        ctx.fill();
        // Roof
        ctx.fillStyle = '#aa2222';
        ctx.beginPath();
        ctx.roundRect(-size * 0.5, -size * 0.8, size, size * 0.45, 3);
        ctx.fill();
        // Wheels
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(-size * 0.6, size * 0.4, size * 0.25, 0, Math.PI * 2);
        ctx.arc(size * 0.6, size * 0.4, size * 0.25, 0, Math.PI * 2);
        ctx.fill();
        // Headlights
        ctx.fillStyle = '#ffff00';
        ctx.fillRect(size * 0.8, -size * 0.2, size * 0.2, size * 0.15);
        ctx.fillRect(-size, -size * 0.2, size * 0.2, size * 0.15);
        break;

      case 'asteroid':
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2;
          const r = size * (0.7 + 0.3 * Math.sin(i * 2.5 + phase));
          if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        const ag = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
        ag.addColorStop(0, '#a09080');
        ag.addColorStop(1, w.trapColor);
        ctx.fillStyle = ag;
        ctx.fill();
        // Craters
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath(); ctx.arc(size * 0.2, -size * 0.1, size * 0.15, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(-size * 0.3, size * 0.2, size * 0.1, 0, Math.PI * 2); ctx.fill();
        break;
    }
    ctx.restore();
  }

  function drawThemedBall(worldIdx) {
    const w = WORLDS[worldIdx];
    const tc = w.trailColor;
    // Jungle uses larger visual radius
    const visualR = worldIdx === 0 ? 28 : BALL_RADIUS;

    // Trail
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const alpha = (1 - t.age / 0.3) * 0.4 * (i / trail.length);
      const r = visualR * (0.3 + 0.5 * (i / trail.length));
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${tc[0]},${tc[1]},${tc[2]},${alpha})`;
      ctx.fill();
    }

    // Drop shadow beneath ball
    ctx.beginPath();
    ctx.ellipse(ball.x + 3, ball.y + visualR * 0.7, visualR * 0.7, visualR * 0.2, 0, 0, Math.PI * 2);
    ctx.fillStyle = worldIdx === 0 ? 'rgba(0,0,0,0.35)' : 'rgba(0,0,0,0.3)';
    ctx.fill();

    const flashAlpha = trapInvulnTimer > 0 ? (Math.sin(performance.now() / 50) * 0.5 + 0.5) : 1;
    ctx.globalAlpha = flashAlpha;

    // Ball body
    const grad = ctx.createRadialGradient(
      ball.x - visualR * 0.3, ball.y - visualR * 0.3, visualR * 0.1,
      ball.x, ball.y, visualR
    );
    if (worldIdx === 0) {
      // Rich brown coconut gradient
      grad.addColorStop(0, '#c49a6c');
      grad.addColorStop(0.3, '#8B5E3C');
      grad.addColorStop(0.7, '#6B3F1F');
      grad.addColorStop(1, '#3a1e0a');
    } else {
      grad.addColorStop(0, w.ballColors[2] || '#fff');
      grad.addColorStop(0.6, w.ballColors[0]);
      grad.addColorStop(1, w.ballColors[1]);
    }

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, visualR, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // World-specific ball decoration
    switch (worldIdx) {
      case 0: {
        // Jungle: detailed coconut
        const R = visualR;
        // Three dark curved lines (coconut texture)
        ctx.strokeStyle = 'rgba(40,18,5,0.6)';
        ctx.lineWidth = 1.8;
        // Line 1 - horizontal curve
        ctx.beginPath();
        ctx.arc(ball.x, ball.y + R * 0.1, R * 0.7, -0.8, 0.8);
        ctx.stroke();
        // Line 2 - diagonal curve
        ctx.beginPath();
        ctx.arc(ball.x - R * 0.2, ball.y - R * 0.15, R * 0.6, 0.5, 2.2);
        ctx.stroke();
        // Line 3 - other diagonal
        ctx.beginPath();
        ctx.arc(ball.x + R * 0.2, ball.y + R * 0.2, R * 0.55, 2.5, 4.0);
        ctx.stroke();

        // Fibrous texture (thin lines)
        ctx.strokeStyle = 'rgba(60,30,10,0.25)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < 8; i++) {
          const a = i * 0.8 + 0.2;
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, R * (0.4 + i * 0.06), a, a + 0.9);
          ctx.stroke();
        }

        // White shine spot top-left
        ctx.beginPath();
        ctx.arc(ball.x - R * 0.35, ball.y - R * 0.35, R * 0.18, 0, Math.PI * 2);
        const shineGrad = ctx.createRadialGradient(
          ball.x - R * 0.35, ball.y - R * 0.35, 0,
          ball.x - R * 0.35, ball.y - R * 0.35, R * 0.18
        );
        shineGrad.addColorStop(0, 'rgba(255,255,255,0.6)');
        shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = shineGrad;
        ctx.fill();
        break;
      }
      case 1: // Desert: sand texture dots
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        for (let i = 0; i < 5; i++) {
          const a = i * 1.3;
          const r = visualR * 0.5;
          ctx.beginPath();
          ctx.arc(ball.x + Math.cos(a) * r, ball.y + Math.sin(a) * r, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
        break;
      case 2: // Sea: bubble highlights
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(ball.x - 3, ball.y - 4, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ball.x + 4, ball.y - 2, 2, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 3: // Urban: basketball lines
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(ball.x - visualR, ball.y);
        ctx.lineTo(ball.x + visualR, ball.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(ball.x, ball.y - visualR);
        ctx.lineTo(ball.x, ball.y + visualR);
        ctx.stroke();
        break;
      case 4: // Space: visor shine
        ctx.strokeStyle = 'rgba(100,150,255,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, visualR * 0.8, -0.8, 0.3);
        ctx.stroke();
        ctx.fillStyle = 'rgba(200,220,255,0.15)';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, visualR * 0.75, 0, Math.PI * 2);
        ctx.fill();
        break;
    }

    // Shine highlight (skip for jungle - handled above)
    if (worldIdx !== 0) {
      ctx.beginPath();
      ctx.arc(ball.x - visualR * 0.3, ball.y - visualR * 0.3, visualR * 0.25, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fill();
    }

    // Speed boost glow ring
    if (speedBoostTimer > 0) {
      ctx.strokeStyle = `rgba(128,255,64,${0.4 + 0.3 * Math.sin(performance.now() / 100)})`;
      ctx.lineWidth = 2;
      ctx.shadowColor = '#80ff40';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, visualR + 4, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    ctx.globalAlpha = 1;
  }

  function drawAmbientParticles(worldIdx) {
    const w = WORLDS[worldIdx];
    const pc = w.particleColor;

    for (const p of ambientParticles) {
      ctx.globalAlpha = p.alpha * (0.5 + 0.5 * Math.sin(p.phase));

      // Jungle uses subtypes for multi-particle system
      if (worldIdx === 0 && p.subtype) {
        if (p.subtype === 'leaf') {
          // Actual leaf shapes with rotation
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(Math.sin(p.phase * 0.7) * 1.2 + p.phase * 0.3);
          const leafColors4 = ['#3a8a20', '#6db33f', '#8B6914', '#5a9a30'];
          ctx.fillStyle = leafColors4[p.colorIdx || 0];
          // Leaf shape using bezier
          ctx.beginPath();
          ctx.moveTo(-p.size * 2.5, 0);
          ctx.bezierCurveTo(-p.size * 1.5, -p.size * 1.5, p.size * 1, -p.size * 1.2, p.size * 2.5, 0);
          ctx.bezierCurveTo(p.size * 1, p.size * 1.2, -p.size * 1.5, p.size * 1.5, -p.size * 2.5, 0);
          ctx.closePath();
          ctx.fill();
          // Central vein
          ctx.strokeStyle = 'rgba(0,50,0,0.35)';
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(-p.size * 2.2, 0);
          ctx.lineTo(p.size * 2.2, 0);
          ctx.stroke();
          // Side veins
          ctx.lineWidth = 0.3;
          for (let v = -1; v <= 1; v++) {
            if (v === 0) continue;
            ctx.beginPath();
            ctx.moveTo(v * p.size, 0);
            ctx.lineTo(v * p.size * 1.5, v * -p.size * 0.6);
            ctx.stroke();
          }
          ctx.restore();
        } else if (p.subtype === 'firefly') {
          // Bright yellow-green dots with soft glow halo
          const glowAlpha = 0.3 + 0.5 * Math.sin(p.phase * 2);
          ctx.globalAlpha = p.alpha * glowAlpha;
          // Outer glow halo
          const ffGlow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 5);
          ffGlow.addColorStop(0, 'rgba(180,255,80,0.3)');
          ffGlow.addColorStop(0.4, 'rgba(150,230,60,0.1)');
          ffGlow.addColorStop(1, 'rgba(100,200,40,0)');
          ctx.fillStyle = ffGlow;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 5, 0, Math.PI * 2);
          ctx.fill();
          // Core bright dot
          ctx.globalAlpha = p.alpha * (0.6 + 0.4 * glowAlpha);
          ctx.fillStyle = '#ccff44';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.subtype === 'pollen') {
          // Tiny white dots drifting upward
          ctx.globalAlpha = p.alpha * (0.5 + 0.5 * Math.sin(p.phase));
          ctx.fillStyle = 'rgba(255,255,240,0.7)';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.subtype === 'mist') {
          // Large very low opacity white blobs moving sideways
          ctx.globalAlpha = p.alpha * (0.6 + 0.4 * Math.sin(p.phase * 0.3));
          const mistGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
          mistGrad.addColorStop(0, 'rgba(180,200,180,0.15)');
          mistGrad.addColorStop(0.5, 'rgba(150,180,150,0.06)');
          mistGrad.addColorStop(1, 'rgba(120,150,120,0)');
          ctx.fillStyle = mistGrad;
          ctx.beginPath();
          ctx.ellipse(p.x, p.y, p.size * 1.5, p.size * 0.5, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        continue;
      }

      switch (w.particleType) {
        case 'fallingLeaf':
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(Math.sin(p.phase * 0.7) * 0.8);
          const leafShade = Math.floor(p.phase * 3) % 3;
          const leafColors = ['#3a8a20', '#6db33f', '#8B6914'];
          ctx.fillStyle = leafColors[leafShade];
          ctx.beginPath();
          ctx.ellipse(0, 0, p.size * 2.5, p.size * 1.2, Math.sin(p.phase) * 0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(0,50,0,0.3)';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(-p.size * 2, 0);
          ctx.lineTo(p.size * 2, 0);
          ctx.stroke();
          ctx.restore();
          break;

        case 'firefly':
          ctx.fillStyle = `rgb(${pc[0]},${pc[1]},${pc[2]})`;
          ctx.shadowColor = `rgb(${pc[0]},${pc[1]},${pc[2]})`;
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
          break;

        case 'dust':
          ctx.fillStyle = `rgb(${pc[0]},${pc[1]},${pc[2]})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 0.8, 0, Math.PI * 2);
          ctx.fill();
          break;

        case 'bubble':
          ctx.strokeStyle = `rgba(${pc[0]},${pc[1]},${pc[2]},0.4)`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = `rgba(255,255,255,0.15)`;
          ctx.beginPath();
          ctx.arc(p.x - p.size * 0.5, p.y - p.size * 0.5, p.size * 0.5, 0, Math.PI * 2);
          ctx.fill();
          break;

        case 'rain':
          ctx.strokeStyle = `rgba(${pc[0]},${pc[1]},${pc[2]},0.4)`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p.x - 1, p.y + p.size * 5);
          ctx.stroke();
          break;

        case 'stardrift':
          ctx.fillStyle = `rgb(${pc[0]},${pc[1]},${pc[2]})`;
          drawStar5(p.x, p.y, p.size, p.size * 0.4);
          ctx.fill();
          break;
      }
    }
    ctx.globalAlpha = 1;
  }

  // ========== DRAW SPEED BOOST ==========
  function drawSpeedBoost(sb, time) {
    const { x, y } = sb;
    const pulse = 1 + 0.1 * Math.sin(time * 3 + sb.phase);
    const r = SPEED_BOOST_RADIUS * pulse;

    ctx.save();
    ctx.translate(x, y);

    if (currentWorld === 0) {
      // Jungle: vine style
      ctx.strokeStyle = '#4a7a2a';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, r);
      ctx.quadraticCurveTo(-r * 0.5, 0, 0, -r);
      ctx.stroke();
      ctx.strokeStyle = '#3a6a1a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -r * 0.3);
      ctx.quadraticCurveTo(r * 0.6, -r * 0.6, r * 0.3, -r * 0.9);
      ctx.stroke();
      ctx.shadowColor = '#80ff40';
      ctx.shadowBlur = 12 + 5 * Math.sin(time * 4 + sb.phase);
      const leafPositions = [
        { lx: -r * 0.3, ly: -r * 0.5, a: -0.4 },
        { lx: r * 0.2, ly: -r * 0.2, a: 0.3 },
        { lx: -r * 0.1, ly: r * 0.3, a: -0.2 },
        { lx: r * 0.35, ly: -r * 0.7, a: 0.5 }
      ];
      for (const lp of leafPositions) {
        ctx.save();
        ctx.translate(lp.lx, lp.ly);
        ctx.rotate(lp.a + Math.sin(time * 2 + sb.phase) * 0.15);
        ctx.fillStyle = '#60d030';
        ctx.beginPath();
        ctx.ellipse(0, 0, r * 0.25, r * 0.1, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,80,0,0.4)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(-r * 0.2, 0);
        ctx.lineTo(r * 0.2, 0);
        ctx.stroke();
        ctx.restore();
      }
      ctx.beginPath();
      ctx.arc(0, -r * 0.1, r * 0.2, 0, Math.PI * 2);
      const gg = ctx.createRadialGradient(0, -r * 0.1, 0, 0, -r * 0.1, r * 0.25);
      gg.addColorStop(0, 'rgba(180,255,80,0.9)');
      gg.addColorStop(1, 'rgba(80,200,40,0)');
      ctx.fillStyle = gg;
      ctx.fill();
    } else {
      // All other worlds: lightning bolt pickup
      ctx.shadowColor = '#ffff40';
      ctx.shadowBlur = 14 + 6 * Math.sin(time * 5 + sb.phase);

      // Glow circle behind bolt
      const bg = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 1.2);
      bg.addColorStop(0, 'rgba(255,255,100,0.3)');
      bg.addColorStop(1, 'rgba(255,200,0,0)');
      ctx.fillStyle = bg;
      ctx.beginPath();
      ctx.arc(0, 0, r * 1.2, 0, Math.PI * 2);
      ctx.fill();

      // Lightning bolt shape
      ctx.fillStyle = '#ffe040';
      ctx.beginPath();
      ctx.moveTo(-r * 0.15, -r * 0.9);
      ctx.lineTo(r * 0.35, -r * 0.9);
      ctx.lineTo(r * 0.05, -r * 0.15);
      ctx.lineTo(r * 0.4, -r * 0.15);
      ctx.lineTo(-r * 0.2, r * 0.9);
      ctx.lineTo(r * 0.05, r * 0.05);
      ctx.lineTo(-r * 0.3, r * 0.05);
      ctx.closePath();
      ctx.fill();

      // Bright center highlight
      ctx.fillStyle = 'rgba(255,255,220,0.6)';
      ctx.beginPath();
      ctx.moveTo(-r * 0.05, -r * 0.7);
      ctx.lineTo(r * 0.2, -r * 0.7);
      ctx.lineTo(r * 0.0, -r * 0.2);
      ctx.closePath();
      ctx.fill();
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // ========== DRAW HUD ==========
  function drawHUD() {
    const w = WORLDS[currentWorld];
    const isJungle = currentWorld === 0;

    if (isJungle) {
      // === JUNGLE HUD - dark green panels with leaf decorations ===

      // Level name panel - top center
      const labelText = '\u{1F33F} ' + w.name + ' - Level ' + (currentLevel + 1);
      ctx.font = '400 12px Orbitron';
      const labelW = ctx.measureText(labelText).width + 24;
      // Dark green panel background
      ctx.fillStyle = 'rgba(10,40,10,0.65)';
      ctx.beginPath();
      ctx.roundRect(W / 2 - labelW / 2, 6, labelW, 22, 6);
      ctx.fill();
      ctx.strokeStyle = 'rgba(40,100,30,0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();
      // Tiny leaf decorations on panel corners
      ctx.fillStyle = 'rgba(60,130,30,0.5)';
      ctx.beginPath();
      ctx.ellipse(W / 2 - labelW / 2 + 4, 10, 5, 2.5, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(W / 2 + labelW / 2 - 4, 10, 5, 2.5, 0.4, 0, Math.PI * 2);
      ctx.fill();
      // Label text
      ctx.fillStyle = 'rgba(200,230,180,0.8)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(labelText, W / 2, 10);

      // Score panel - top left (dark green panel)
      ctx.fillStyle = 'rgba(10,40,10,0.65)';
      ctx.beginPath();
      ctx.roundRect(10, 32, 90, 44, 8);
      ctx.fill();
      ctx.strokeStyle = 'rgba(40,100,30,0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();
      // Score value
      ctx.font = '700 22px Orbitron';
      ctx.fillStyle = '#e0f0c0';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(score, 18, 36);
      // Pass indicator
      if (score < levelPassScore) {
        ctx.font = '400 9px Orbitron';
        ctx.fillStyle = 'rgba(180,200,150,0.5)';
        ctx.fillText('NEED ' + levelPassScore, 18, 60);
      } else {
        ctx.font = '400 9px Orbitron';
        ctx.fillStyle = 'rgba(120,230,80,0.8)';
        ctx.fillText('PASS!', 18, 60);
      }

      // Combo panel - top right
      if (combo > 1) {
        ctx.fillStyle = 'rgba(10,40,10,0.65)';
        ctx.beginPath();
        ctx.roundRect(W - 70, 32, 60, 34, 8);
        ctx.fill();
        ctx.strokeStyle = 'rgba(40,100,30,0.4)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.font = '900 22px Orbitron';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        const comboColors = { 2: '#80e050', 4: '#e0d040', 8: '#ff6030' };
        ctx.fillStyle = comboColors[combo] || '#ffd700';
        ctx.fillText('x' + combo, W - 16, 36);
      }

      // Timer bar - vine style (bottom)
      const barH = 8;
      const barY = H - barH - 10;
      const barW = W - 32;
      const pct = Math.max(0, timeLeft / levelGameTime);

      // Vine background (brown, organic edges)
      ctx.fillStyle = 'rgba(40,20,8,0.5)';
      ctx.beginPath();
      ctx.roundRect(16, barY - 1, barW, barH + 2, 4);
      ctx.fill();
      ctx.strokeStyle = 'rgba(60,30,10,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Vine fill with organic texture
      const vineW = barW * pct;
      if (vineW > 2) {
        const vg = ctx.createLinearGradient(16, barY, 16 + vineW, barY);
        if (pct > 0.2) {
          vg.addColorStop(0, '#3a5a15');
          vg.addColorStop(0.3, '#5a8a25');
          vg.addColorStop(0.6, '#4a7a1a');
          vg.addColorStop(1, '#3a6515');
        } else {
          vg.addColorStop(0, '#8a3a10');
          vg.addColorStop(0.5, '#cc4400');
          vg.addColorStop(1, '#aa3300');
        }
        ctx.fillStyle = vg;
        ctx.beginPath();
        ctx.roundRect(16, barY, vineW, barH, 4);
        ctx.fill();

        // Organic edges (slightly bumpy top edge)
        ctx.fillStyle = pct > 0.2 ? 'rgba(80,140,30,0.3)' : 'rgba(180,60,20,0.3)';
        for (let i = 0; i < Math.floor(vineW / 15); i++) {
          const bx = 20 + i * 15;
          if (bx > 16 + vineW - 5) break;
          ctx.beginPath();
          ctx.ellipse(bx, barY, 3, 1.5, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        // Leaf buds along vine
        ctx.fillStyle = pct > 0.2 ? '#60a030' : '#aa5520';
        const leafCount = Math.floor(vineW / 50);
        for (let i = 0; i < leafCount; i++) {
          const lx = 16 + (i + 1) * vineW / (leafCount + 1);
          ctx.save();
          ctx.translate(lx, barY - 2);
          ctx.rotate(-0.3);
          ctx.beginPath();
          ctx.ellipse(0, 0, 5, 2.5, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      // Time text
      ctx.font = '400 11px Orbitron';
      ctx.fillStyle = 'rgba(180,210,150,0.7)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(Math.ceil(timeLeft) + 's', W / 2, barY - 16);

      // Speed boost indicator
      if (speedBoostTimer > 0) {
        ctx.font = '700 12px Orbitron';
        ctx.fillStyle = `rgba(128,255,64,${0.6 + 0.4 * Math.sin(performance.now() / 150)})`;
        ctx.textAlign = 'center';
        ctx.fillText('SPEED BOOST!', W / 2, barY - 32);
      }

    } else {
      // === Non-jungle HUD (original style) ===

      // Level name - top center
      ctx.font = '400 12px Orbitron';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(w.icon + ' ' + w.name + ' - Level ' + (currentLevel + 1), W / 2, 12);

      // Score - top left
      ctx.font = '700 22px Orbitron';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(score, 16, 36);

      // Pass threshold indicator
      if (score < levelPassScore) {
        ctx.font = '400 10px Orbitron';
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillText('NEED ' + levelPassScore, 16, 60);
      } else {
        ctx.font = '400 10px Orbitron';
        ctx.fillStyle = 'rgba(80,220,120,0.7)';
        ctx.fillText('PASS!', 16, 60);
      }

      // Combo - top right
      if (combo > 1) {
        ctx.font = '900 24px Orbitron';
        ctx.textAlign = 'right';
        const comboColors = { 2: '#4fc3f7', 4: '#ab47bc', 8: '#ff5722' };
        ctx.fillStyle = comboColors[combo] || '#ffd700';
        ctx.fillText('x' + combo, W - 16, 36);
      }

      // Timer bar - bottom
      const barH = 6;
      const barY = H - barH - 8;
      const barW = W - 32;
      const pct = Math.max(0, timeLeft / levelGameTime);

      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.beginPath();
      ctx.roundRect(16, barY, barW, barH, 3);
      ctx.fill();

      let barColor;
      if (pct > 0.5) barColor = '#4fc3f7';
      else if (pct > 0.2) barColor = '#ffd700';
